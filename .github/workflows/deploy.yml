name: Rust CI/CD to AWS EC2

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  PROJECT_NAME: livana-backend-v2

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    # ❌ defaults: run: wala block Yahan se HATA DEIN

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # ... baki steps same ...

    - name: Upload Binary as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rust-release-binary
        path: target/release/${{ env.PROJECT_NAME }} # 👈 path theek kar dein
        retention-days: 1


  deploy:
    name: Deploy to AWS EC2
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: rust-release-binary
        path: .

    - name: Copy Binary to AWS EC2 via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.AWS_HOST }}
        username: ${{ secrets.AWS_USERNAME }}
        key: ${{ secrets.AWS_SSH_KEY }}
        source: ${{ env.PROJECT_NAME }}
        target: "/home/${{ secrets.AWS_USERNAME }}/app_deploy"

    - name: Execute and Restart Service on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AWS_HOST }}
        username: ${{ secrets.AWS_USERNAME }}
        key: ${{ secrets.AWS_SSH_KEY }}
        script: |
          mkdir -p /home/${{ secrets.AWS_USERNAME }}/app_deploy
          cd /home/${{ secrets.AWS_USERNAME }}/app_deploy
          chmod +x ${{ env.PROJECT_NAME }}
          sudo mv ${{ env.PROJECT_NAME }} /usr/local/bin/${{ env.PROJECT_NAME }}
          # ⚠️ Ensure your systemd service file is already created on EC2
          sudo systemctl restart ${{ env.PROJECT_NAME }}.service
